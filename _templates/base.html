<!DOCTYPE html>
<html lang="en">
<head>
    <title>{% block title %}Patrick Stephens{% endblock %}</title>
    <link rel="stylesheet" href="/resources/styles/global.css">
    <link href="{% block canonical %}https://patrickcstephens.com/{% endblock %}" rel="canonical">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <base href="/">

    <!-- Head Elements: https://www.w3schools.com/html/html_head.asp -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8"> <!-- Define the character set used -->
    <meta name="author" content="Patrick Stephens">
    <meta name="keywords" content="">
    <meta name="description" content="{% block meta_description %}{% endblock %}">
    {% block meta_robots %}{% endblock %}

</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5GGZZMBHJP"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-5GGZZMBHJP');
</script>
<body>
    <header>
        <div class="global-nav-container" id="global-nav-container">
        <!-- global-nav.js will execute here -->
        </div>
    </header>
    <main>
        <div class="main-content-container">
            {% block content %}{% endblock %}
            <div class="responsive-main-content-sidebar-divider"></div>
        </div>
        <div class="global-sidebar-container" id="global-sidebar-container">
            <!-- global-sidebar.js will execute here -->
        </div>

        <!-- Page Content Scripts -->
        <script src="/resources/js/global-nav.js"></script>
        <script src="/resources/js/global-sidebar.js"></script>
        <script src="/resources/js/global-footer.js"></script>
        {% block extra_scripts %}{% endblock %}
    </main>
    <footer>
        <div class="global-footer-container" id="global-footer-container">
            <!-- global-footer.js will execute here -->
        </div>
    </footer>
</div>
</body>
</html>
